info:
  name: Unknown code
  type: http
  seq: 2

http:
  method: GET
  url: '{{baseUrl}}/missing'

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: '404'
    - expression: res.body.code
      operator: eq
      value: LINK_NOT_FOUND

settings:
  encodeUrl: true
  timeout: 5000
