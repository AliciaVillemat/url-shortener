info:
  name: Redirect last created link
  type: http
  seq: 1
  tags:
    - smoke

http:
  method: GET
  url: '{{baseUrl}}/{{shortCode}}'

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: '302'
    - expression: res.headers.location
      operator: eq
      value: https://www.example.com/some/long/path

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0
