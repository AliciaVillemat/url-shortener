info:
  name: Invalid expiration
  type: http
  seq: 8

http:
  method: POST
  url: '{{baseUrl}}/api/links'
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "url": "https://example.com",
        "expiration": "2h"
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: '400'
    - expression: res.body.code
      operator: eq
      value: INVALID_EXPIRATION

settings:
  encodeUrl: true
  timeout: 5000
