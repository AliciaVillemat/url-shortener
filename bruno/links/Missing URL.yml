info:
  name: Missing URL
  type: http
  seq: 3

http:
  method: POST
  url: '{{baseUrl}}/api/links'
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: '{}'

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: '400'
    - expression: res.body.code
      operator: eq
      value: URL_REQUIRED

settings:
  encodeUrl: true
  timeout: 5000
