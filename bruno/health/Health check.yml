info:
  name: Health check
  type: http
  seq: 1
  tags:
    - smoke

http:
  method: GET
  url: '{{baseUrl}}/api/health'

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: '200'
    - expression: res.body.status
      operator: eq
      value: ok

settings:
  encodeUrl: true
  timeout: 5000
